<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Oleo+Script:wght@700&family=Quicksand:wght@300;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Travel Goals</title>
  </head>
  <body>
    <header>
      <div id="page-logo">
        <a href="#">TRAVEL GOALS</a>
      </div>
      <nav>
        <ul>
          <li><a href="#">Destinations</a></li>
          <li><a href="#">About</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="hero">
        <div id="hero-content">
          <h1>JOE'S TRAVEL PAGE</h1>
          <p>LET'S EXPLORE THE WORLD TOGETHER</p>
          <a href="#" class="btn">Discover places</a>
        </div>
      </section>
      <section id="highlights">
        <h2>HIGHLIGHTS</h2>
        <ul id="destinations">
          <li class="destination">
            <img src="extra-files/cities/miami.jpg" alt="Miami streets on sunny day" />
            <p>MIAMI <strong>USA</strong></p>
          </li>
          <li class="destination">
            <img src="extra-files/cities/munich.jpg" alt="Munich stadium in winter" />
            <p>MUNICH <strong>GERMANY</strong></p>
          </li>
          <li class="destination">
            <img src="extra-files/cities/barcelona.jpg" alt="Palm beach in Barcelona" />
            <p>BARCELONA <strong>SPAIN</strong></p>
          </li>
        </ul>
      </section>
    </main>
    <footer>
      <ul>
        <li>
          <a href="https://www.instagram.com">
            <img src="extra-files/icons/insta.png" alt="Instagram logo" />
          </a>
        </li>
        <li>
          <a href="https://www.facebook.com">
            <img src="extra-files/icons/facebook.png" alt="Facebook logo" />
          </a>
        </li>
      </ul>
    </footer>
  </body>
</html>
