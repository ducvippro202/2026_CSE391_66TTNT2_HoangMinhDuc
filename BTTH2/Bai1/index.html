<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <form action="" id="message">
        <h3>Get in touch with us by filling contact form below</h3>
        
        <div class="row">
            <input type="text" placeholder="* Enter your full name">
            <input type="text" placeholder="* Enter your email address">
        </div>
        
        <input type="text" placeholder="Enter your subject">
        
        <textarea placeholder="* Your message here..." rows="8" class="inputmessage"></textarea>
        
        <div class="footer">
            <button type="submit" class="click">Send message</button>
            <p>* Please fill all required form field, thanks!</p>
        </div>
    </form>

</body>
</html>
